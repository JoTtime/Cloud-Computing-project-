server.port=8085
spring.application.name=appointmentmicroservice

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medconnect_appointments}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ISI3Eng!2025}
spring.datasource.driver-class-name=org.postgresql.Driver

medconnect.database.create-if-not-exists=true
medconnect.database.admin-database=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

medconnect.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
medconnect.appointment.default-location=Clinic
medconnect.appointment.day-start=09:00
medconnect.appointment.day-end=17:00
medconnect.appointment.slot-duration-minutes=30
medconnect.doctor-service.url=${MEDCONNECT_DOCTOR_SERVICE_URL:http://localhost:8082}
medconnect.user-service.url=${MEDCONNECT_USER_SERVICE_URL:http://localhost:8086}
