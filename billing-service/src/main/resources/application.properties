spring:
application:
name: billing-service

datasource:
url: jdbc:mysql://localhost:3306/billing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
username: root
password: root
driver-class-name: com.mysql.cj.jdbc.Driver

jpa:
database-platform: org.hibernate.dialect.MySQLDialect
ddl-auto: update
show-sql: false
properties:
hibernate:
format_sql: true

server:
port: 8080

logging:
level:
org.example.billingservice: DEBUG
org.springframework.web: INFO
