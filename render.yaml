databases:
  - name: medconnect-db
    databaseName: medconnect
    user: medconnect
    plan: free

services:
  - type: web
    name: usermicroservice
    runtime: docker
    plan: free
    rootDir: usermicroservice
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_CLOUD_DISCOVERY_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: MEDCONNECT_DATABASE_CREATE_IF_NOT_EXISTS
        value: "false"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d7lc3k5ckfvc73a6f7tg-a:5432/medconnect_fisq"
      - key: SPRING_DATASOURCE_USERNAME
        value: "medconnect"
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: doctormicroservice
    runtime: docker
    plan: free
    rootDir: doctormicroservice
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_CLOUD_DISCOVERY_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: MEDCONNECT_DATABASE_CREATE_IF_NOT_EXISTS
        value: "false"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d7lc3k5ckfvc73a6f7tg-a:5432/medconnect_fisq"
      - key: SPRING_DATASOURCE_USERNAME
        value: "medconnect"
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: patientmicroservice
    runtime: docker
    plan: free
    rootDir: patientmicroservice
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_CLOUD_DISCOVERY_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: MEDCONNECT_DATABASE_CREATE_IF_NOT_EXISTS
        value: "false"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d7lc3k5ckfvc73a6f7tg-a:5432/medconnect_fisq"
      - key: SPRING_DATASOURCE_USERNAME
        value: "medconnect"
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: appointmentmicroservice
    runtime: docker
    plan: free
    rootDir: appointmentmicroservice
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_CLOUD_DISCOVERY_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: MEDCONNECT_DATABASE_CREATE_IF_NOT_EXISTS
        value: "false"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d7lc3k5ckfvc73a6f7tg-a:5432/medconnect_fisq"
      - key: SPRING_DATASOURCE_USERNAME
        value: "medconnect"
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: billingmicroservice
    runtime: docker
    plan: free
    rootDir: billingmicroservice
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_CLOUD_DISCOVERY_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: MEDCONNECT_DATABASE_CREATE_IF_NOT_EXISTS
        value: "false"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d7lc3k5ckfvc73a6f7tg-a:5432/medconnect_fisq"
      - key: SPRING_DATASOURCE_USERNAME
        value: "medconnect"
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APPOINTMENT_API_URL
        sync: false
      - key: DOCTOR_API_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: medconnect-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build:render
    staticPublishPath: dist/med-connect/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: USER_API_URL
        sync: false
      - key: APPOINTMENT_API_URL
        sync: false
      - key: DOCTOR_API_URL
        sync: false
      - key: PATIENT_API_URL
        sync: false
      - key: BILLING_API_URL
        sync: false