<div class="app-shell">

  <!-- SIDEBAR (fixed, never scrolls) -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Med-Connect</span>
        <span class="brand-sub">Admin Portal</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav">
      <a class="nav-item" routerLink="/admin/overview" routerLinkActive="nav-item--active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Overview</span>
      </a>
      <a class="nav-item" routerLink="/admin/patients" routerLinkActive="nav-item--active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
        </svg>
        <span>Patients</span>
      </a>
      <a class="nav-item" routerLink="/admin/doctors" routerLinkActive="nav-item--active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
          <path d="M12 12v2m0 4h.01M8 22h8a2 2 0 0 0 2-2v-1a5 5 0 0 0-10 0v1a2 2 0 0 0 2 2z"/>
        </svg>
        <span>Doctors</span>
      </a>
      <a class="nav-item" routerLink="/admin/analytics" routerLinkActive="nav-item--active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="20" x2="12" y2="10"/>
          <line x1="18" y1="20" x2="18" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="16"/>
        </svg>
        <span>Analytics</span>
      </a>
    </nav>

    <div class="sidebar__help">
      <p class="help-title">Need help?</p>
      <p class="help-sub">Contact our 24/7 support team anytime.</p>
      <button class="help-btn">Get support</button>
    </div>
  </aside>

  <!-- MAIN AREA (scrolls) -->
  <div class="main-area">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar__search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search users, accounts, reports…" [(ngModel)]="globalSearch">
      </div>
      <div class="topbar__actions">
        <button class="topbar-icon-btn" (click)="toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" *ngIf="hasNotifications"></span>
        </button>
        <button class="topbar-icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          </svg>
        </button>
        <button class="topbar-icon-btn" (click)="logout()" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
        <div class="topbar-profile" (click)="goToProfile()">
          <div class="profile-avatar">{{ adminInitials }}</div>
          <div class="profile-info">
            <span class="profile-name">{{ adminName }}</span>
            <span class="profile-role">Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT (only this scrolls) -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
