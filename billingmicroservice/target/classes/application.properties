server.port=8083
spring.application.name=billing-service

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medconnect_billing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ISI3Eng!2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# Auto-create database if missing
medconnect.database.create-if-not-exists=true
medconnect.database.admin-database=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT (must match user-service secret)
medconnect.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
medconnect.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info

# Appointment service URL (for appointment status checks)
medconnect.appointment-service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8085}

# Campay payment gateway
campay.base-url=${CAMPAY_BASE_URL:https://demo.campay.net/api}
campay.username=${CAMPAY_USERNAME:}
campay.password=${CAMPAY_PASSWORD:}
campay.currency=${CAMPAY_CURRENCY:XAF}
