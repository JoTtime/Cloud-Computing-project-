server.port=8090
spring.application.name=billingmicroservice

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medconnect_billing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fifa24}
spring.datasource.driver-class-name=org.postgresql.Driver

medconnect.database.create-if-not-exists=true
medconnect.database.admin-database=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

medconnect.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
medconnect.services.appointment-api-url=${APPOINTMENT_API_URL:http://localhost:8087/api}
medconnect.services.doctor-api-url=${DOCTOR_API_URL:http://localhost:8088/api}
# Used when a doctor profile has no positive consultation fee yet (invoice generation).
medconnect.billing.default-consultation-fee-fcfa=${DEFAULT_CONSULTATION_FEE_FCFA:25000}
