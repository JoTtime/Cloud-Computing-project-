server.port=8086
spring.application.name=usermicroservice

# Eureka — disabled when no Eureka server is running locally
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# PostgreSQL (override with SPRING_DATASOURCE_* or env-specific files)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medconnect_users}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fifa24}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connects to medconnect.database.admin-database first, then CREATE DATABASE if missing (requires CREATEDB or superuser).
medconnect.database.create-if-not-exists=true
medconnect.database.admin-database=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT (override in production via env)
medconnect.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
medconnect.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Default admin bootstrap user
medconnect.admin.email=${ADMIN_EMAIL:admin@medconnect.com}
medconnect.admin.password=${ADMIN_PASSWORD:Admin@12345}
medconnect.admin.first-name=${ADMIN_FIRST_NAME:System}
medconnect.admin.last-name=${ADMIN_LAST_NAME:Admin}
medconnect.admin.force-reset-password=${ADMIN_FORCE_RESET_PASSWORD:true}
