server.port=8086
spring.application.name=usermicroservice

# Eureka (set spring.cloud.discovery.enabled=false if no server is running locally)
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# PostgreSQL (override with SPRING_DATASOURCE_* or env-specific files)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medconnect_users}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fifa24}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connects to medconnect.database.admin-database first, then CREATE DATABASE if missing (requires CREATEDB or superuser).
medconnect.database.create-if-not-exists=true
medconnect.database.admin-database=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT (override in production via env)
medconnect.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
medconnect.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Patient microservice integration
patient.service.base-url=${PATIENT_SERVICE_BASE_URL:http://localhost:8081}
